<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Web Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="sessions">Sessions</button>
        <button class="sidebar-tab" data-tab="files">Files</button>
        <button id="name-expand-btn" title="展开/收起会话名称">展开</button>
      </div>
      <div id="sidebar-panel-sessions" class="sidebar-panel">
        <div id="session-list"></div>
        <button id="new-session-btn">+ New Session</button>
        <button id="attach-btn">Attach tmux</button>
      </div>
      <div id="sidebar-panel-files" class="sidebar-panel" style="display:none">
        <div id="file-tree-header">
          <button id="file-tree-back-btn" class="btn-icon" title="Parent directory" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
          <span id="file-tree-path" title="">~/</span>
          <div id="file-tree-actions">
            <button id="file-tree-hidden-toggle" class="btn-icon" title="Show hidden files"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
            <button id="file-tree-upload-btn" class="btn-icon" title="Upload files"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
            <button id="file-tree-refresh-btn" class="btn-icon" title="Refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></button>
          </div>
        </div>
        <div id="file-tree"></div>
        <input type="file" id="file-upload-input" multiple style="display:none">
      </div>
    </div>

    <!-- Main -->
    <div id="main">
      <div id="toolbar">
        <button id="menu-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div id="toolbar-content">
        <div id="toolbar-actions">
          <button class="btn-icon" id="notif-bell-btn" title="Notifications"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span id="notif-badge" class="notif-badge" style="display:none">0</span></button>
          <div id="notif-panel" class="notif-panel" style="display:none">
            <div class="notif-panel-header">
              <span class="notif-panel-title">Notifications</span>
              <button id="notif-sound-toggle" class="btn-icon notif-sound-btn" title="Toggle sound"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg></button>
            </div>
            <div id="notif-list" class="notif-list">
              <div class="notif-empty">No notifications</div>
            </div>
            <div class="notif-panel-footer">
              <button id="notif-mark-all-read" class="btn-secondary notif-footer-btn">Mark all read</button>
              <button id="notif-clear-all" class="btn-secondary notif-footer-btn">Clear all</button>
            </div>
          </div>
          <button class="btn-icon" id="shortcut-toggle-btn" title="AI 快捷键"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/></svg></button>
          <button class="btn-icon" id="select-mode-btn" title="Toggle select mode"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h3"/><path d="M20 7V4h-3"/><path d="M4 17v3h3"/><path d="M20 17v3h-3"/></svg></button>
          <span class="toolbar-divider"></span>
          <div class="font-size-group">
            <button class="btn-icon" id="font-dec" title="Decrease font">A-</button>
            <span id="font-size-label"></span>
            <button class="btn-icon" id="font-inc" title="Increase font">A+</button>
          </div>
          <button class="btn-icon" id="theme-toggle-btn" title="切换配色方案"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
          <span id="theme-name-label"></span>
        </div>
        <div id="toolbar-title-row">
          <span id="status-dot" style="display:none"></span>
          <span id="toolbar-title">Web Terminal</span>
        </div>
        </div>
      </div>

      <!-- 快捷键栏（两行） -->
      <div id="shortcut-bar" style="display:none">
        <!-- 第一行：固定按钮（方向键/ESC + tmux命令） -->
        <div id="shortcut-fixed-row"></div>
        <!-- 第二行：AI 分析按钮 -->
        <div id="shortcut-ai-row">
          <div id="shortcut-ai-keys"></div>
          <button id="shortcut-refresh-btn" title="AI 分析快捷键"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></button>
        </div>
      </div>

      <div id="terminal-container" style="display:none"></div>

      <!-- Code Editor -->
      <div id="editor-container" style="display:none">
        <div id="editor-toolbar">
          <span id="editor-filename"></span>
          <span id="editor-lang"></span>
          <span id="editor-position"></span>
          <span id="editor-save-status"></span>
          <button id="editor-edit-btn" class="btn-icon" title="点击开启编辑"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg> 编辑</button>
          <button id="editor-close-btn" class="btn-icon" title="Close editor"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div id="editor-area"></div>
      </div>
      <div id="copy-toast">Copied!</div>

      <div id="no-session">
        <svg class="no-session-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><polyline points="7 9 9 11 7 13"/><line x1="11" y1="13" x2="15" y2="13"/></svg>
        <div>No active terminal</div>
        <button id="no-session-btn">Create Session</button>
      </div>
    </div>
  </div>

  <!-- New Session Wizard Modal -->
  <div id="wizard-modal" class="modal-overlay" style="display:none">
    <div class="modal wizard-modal">
      <div class="modal-header">
        <h2 id="wizard-title">New Session</h2>
        <button class="btn-icon" id="wizard-close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="modal-body wizard-body" id="wizard-body">
      </div>
      <div class="wizard-footer" id="wizard-footer">
        <button class="btn-secondary" id="wizard-skip">跳过</button>
        <div style="flex:1"></div>
        <button class="btn-secondary" id="wizard-back" style="display:none">← 上一步</button>
        <button class="btn-primary" id="wizard-next">下一步 →</button>
      </div>
    </div>
  </div>

  <!-- Attach Modal -->
  <div id="attach-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>Attach tmux Session</h2>
        <button class="btn-icon" id="attach-modal-close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="modal-body">
        <div id="attach-loading">Scanning...</div>
        <div id="attach-content" style="display:none">
          <div id="tmux-list"></div>
          <div id="attach-empty" style="display:none">No tmux sessions found.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.6.0/lib/xterm-addon-web-links.min.js"></script>
  <script src="editor.js"></script>
  <script src="app.js"></script>
</body>
</html>
